<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Soft Telugu - Superfast & Cached</title>

    <!-- Caching & Preconnecting for Superfast Load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://inputtools.google.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
        /* Pure, Minified & Highly Optimized CSS (< 3KB) */
        :root {
            --b50: #ecfdf5;
            --b100: #d1fae5;
            --b500: #10b981;
            --b600: #059669;
            --b700: #047857;
            --s50: #f8fafc;
            --s100: #f1f5f9;
            --s200: #e2e8f0;
            --s300: #cbd5e1;
            --s400: #94a3b8;
            --s500: #64748b;
            --s600: #475569;
            --s700: #334155;
            --s800: #1e293b;
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-te: 'Noto Sans Telugu', 'Plus Jakarta Sans', sans-serif;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: var(--font);
            background: var(--s50);
            color: var(--s800);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .w-full {
            width: 100%;
            max-width: 672px;
        }
        svg {
            display: block;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .icon-box {
            width: 40px;
            height: 40px;
            background: var(--b600);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 10px 15px -3px rgba(5, 150, 105, .2);
        }
        h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -.5px;
        }
        h1 span {
            color: var(--b600);
        }
        .status {
            font-size: 10px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: .3s;
        }
        .st-ready {
            background: var(--b100);
            color: var(--b700);
            border: 1px solid #a7f3d0;
        }
        .st-en {
            background: var(--s100);
            color: var(--s600);
            border: 1px solid var(--s200);
        }

        /* Main Card */
        .card {
            background: #fff;
            border-radius: 24px;
            border: 1px solid var(--s200);
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, .05);
            position: relative;
            margin-bottom: 40px;
        }
        .toolbar {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--s50);
            border-bottom: 1px solid var(--s100);
            border-radius: 24px 24px 0 0;
        }
        .tool-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--s500);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tools {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Toggle Switch */
        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            font-weight: 700;
        }
        .lbl-en {
            color: var(--s400);
            transition: .3s;
        }
        .lbl-te {
            color: var(--b600);
            transition: .3s;
        }
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--s200);
            border-radius: 24px;
            cursor: pointer;
            transition: .3s;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, .05);
        }
        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: .3s;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
        }
        input:checked+.toggle {
            background: var(--b500);
        }
        input:checked+.toggle::after {
            transform: translateX(20px);
        }
        input {
            display: none;
        }

        .divider {
            width: 1px;
            height: 16px;
            background: var(--s300);
        }
        .btn-icon {
            background: none;
            border: none;
            color: var(--s400);
            cursor: pointer;
            transition: .2s;
            padding: 4px;
        }
        .btn-icon:hover {
            color: #ef4444;
        }

        /* Editor */
        .editor-wrap {
            position: relative;
            width: 100%;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 24px;
            font-size: 20px;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            color: var(--s700);
            line-height: 1.7;
            font-family: var(--font-te);
        }
        textarea::placeholder {
            color: var(--s300);
            font-family: var(--font);
            font-size: 16px;
        }
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: var(--s300);
            border-radius: 10px;
        }

        /* Suggestion Bar */
        .sugg-bar {
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 6px;
            background: rgba(255, 255, 255, .95);
            backdrop-filter: blur(8px);
            border: 1px solid var(--s200);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, .2);
            border-radius: 12px;
            position: absolute;
            z-index: 30;
            width: 200px;
            max-height: 250px;
            overflow-y: auto;
            animation: sl .05s ease-out forwards;
            font-family: var(--font-te);
        }
        @keyframes sl {
            from {
                opacity: 0;
                transform: translateY(-2px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .sugg-btn {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            background: transparent;
            border: none;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: var(--s700);
            font-family: var(--font-te);
        }
        .sugg-btn:hover {
            background: var(--s50);
        }
        .sugg-btn.active {
            background: var(--b600);
            color: #fff;
            box-shadow: 0 4px 6px -1px rgba(5, 150, 105, .3);
        }
        .num {
            font-size: 10px;
            background: var(--s100);
            border: 1px solid var(--s200);
            color: var(--s500);
            padding: 2px 6px;
            border-radius: 6px;
            opacity: .8;
            font-family: var(--font);
        }
        .sugg-btn.active .num {
            background: var(--b500);
            border-color: var(--b500);
            color: #fff;
        }

        /* Footer & Stats */
        .card-foot {
            padding: 20px;
            border-top: 1px solid var(--s100);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .stats {
            display: flex;
            gap: 32px;
        }
        .stat {
            display: flex;
            flex-direction: column;
        }
        .st-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--s400);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .st-val {
            font-size: 20px;
            font-weight: 800;
            color: var(--s800);
        }
        .actions {
            display: flex;
            gap: 12px;
            flex: 1;
            justify-content: flex-end;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: .2s;
            border: none;
        }
        .btn:active {
            transform: scale(.95);
        }
        .btn-sec {
            background: #fff;
            border: 1px solid var(--s200);
            color: var(--s600);
        }
        .btn-sec:hover {
            background: var(--s50);
            color: var(--b600);
        }
        .btn-pri {
            background: var(--b600);
            color: #fff;
            box-shadow: 0 10px 15px -3px rgba(5, 150, 105, .25);
        }
        .btn-pri:hover {
            background: var(--b700);
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .4);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: .3s;
        }
        .modal.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background: #fff;
            border-radius: 24px;
            width: 100%;
            max-width: 320px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, .25);
            transform: scale(.95);
            transition: .3s;
        }
        .modal.open .modal-box {
            transform: scale(1);
        }
        .m-icon {
            width: 48px;
            height: 48px;
            background: #fee2e2;
            color: #dc2626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .m-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--s800);
        }
        .m-desc {
            font-size: 14px;
            color: var(--s500);
            margin-bottom: 24px;
        }
        .m-acts {
            display: flex;
            gap: 12px;
        }
        .m-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: .2s;
        }
        .m-cancel {
            background: var(--s100);
            color: var(--s600);
        }
        .m-cancel:hover {
            background: var(--s200);
        }
        .m-clear {
            background: #dc2626;
            color: #fff;
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, .2);
        }
        .m-clear:hover {
            background: #b91c1c;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            background: var(--s800);
            color: #fff;
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(16px);
            transition: .3s;
            z-index: 40;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, .1);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media(max-width:500px) {
            .actions {
                width: 100%;
            }
            .btn {
                flex: 1;
            }
            .stats {
                gap: 20px;
            }
            textarea {
                height: 250px;
                font-size: 18px;
            }
            .sugg-bar {
                width: 180px;
            }
        }
    </style>
</head>
<body>

    <header class="w-full">
        <div class="logo">
            <div class="icon-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            </div>
            <h1>Soft<span>Telugu</span></h1>
        </div>
        <div id="api-status" class="status st-ready">
            <svg id="st-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
            <span id="st-text">SMART API READY</span>
        </div>
    </header>

    <main class="w-full card">
        <div class="toolbar">
            <div class="tool-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2" ry="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></svg>
                <span>తెలుగు వర్క్స్పేస్</span>
            </div>

            <div class="tools">
                <div class="toggle-wrap">
                    <span id="label-en" class="lbl-en">EN</span>
                    <label>
                        <input type="checkbox" id="lang-toggle" checked />
                        <div class="toggle"></div>
                    </label>
                    <span id="label-te" class="lbl-te">TE</span>
                </div>

                <div class="divider"></div>

                <button id="clear-btn" class="btn-icon" title="Clear Editor">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                </button>
            </div>
        </div>

        <div class="editor-wrap">
            <div id="suggestion-bar" class="sugg-bar"></div>
            <textarea id="main-editor" placeholder='ఇంగ్లీష్ లో టైప్ చేయండి (ఉదా: "niraj")...' spellcheck="false"></textarea>
        </div>

        <div class="card-foot">
            <div class="stats">
                <div class="stat">
                    <span class="st-lbl">పదాలు</span>
                    <span id="word-count" class="st-val">0</span>
                </div>
                <div class="stat">
                    <span class="st-lbl">అక్షరాలు</span>
                    <span id="char-count" class="st-val">0</span>
                </div>
            </div>

            <div class="actions">
                <button id="download-btn" class="btn btn-sec">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>
                    Save
                </button>
                <button id="copy-btn" class="btn btn-pri">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    Copy
                </button>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="confirm-modal" class="modal">
        <div class="modal-box">
            <div class="m-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </div>
            <h3 class="m-title">వర్క్స్పేస్ ని ఖాళీ చేయాలా?</h3>
            <p class="m-desc">మీరు ఖచ్చితంగా మొత్తం టెక్స్ట్ ను తొలగించాలనుకుంటున్నారా?</p>
            <div class="m-acts">
                <button id="modal-cancel" class="m-btn m-cancel">రద్దు చేయి</button>
                <button id="modal-confirm" class="m-btn m-clear">అవును, తొలగించు</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Notification</div>

    <script>
        // Caching System Initializer (Silent Cache)
        if ('caches' in window) {
            caches.open('soft-telugu-cache-v1').then(cache => {
                cache.addAll([
                    'https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Telugu:wght@400;600;700&display=swap'
                ]);
            });
        }

        const editor = document.getElementById('main-editor');
        const wordsCount = document.getElementById('word-count');
        const charsCount = document.getElementById('char-count');
        const toast = document.getElementById('toast');
        const suggestionBar = document.getElementById('suggestion-bar');

        let isTransliterationEnabled = true;
        let debounceTimer;
        let currentSuggestions = [];
        let currentWordContext = null;
        let activeSuggestionIndex = 0;

        // Caret calculation logic
        function getCaretCoordinates(element, position) {
            const div = document.createElement('div');
            const computed = window.getComputedStyle(element);
            div.style.whiteSpace = 'pre-wrap';
            div.style.wordWrap = 'break-word';
            div.style.position = 'absolute';
            div.style.visibility = 'hidden';
            const props = ['direction', 'boxSizing', 'width', 'height', 'overflowX', 'overflowY', 'borderTopWidth',
                'borderRightWidth', 'borderBottomWidth', 'borderLeftWidth', 'borderStyle', 'paddingTop',
                'paddingRight', 'paddingBottom', 'paddingLeft', 'fontStyle', 'fontVariant', 'fontWeight',
                'fontStretch', 'fontSize', 'fontSizeAdjust', 'lineHeight', 'fontFamily', 'textAlign',
                'textTransform', 'textIndent', 'textDecoration', 'letterSpacing', 'wordSpacing', 'tabSize',
                'MozTabSize'
            ];
            props.forEach(p => { div.style[p] = computed[p]; });
            div.textContent = element.value.substring(0, position);
            const span = document.createElement('span');
            span.textContent = element.value.substring(position) || '.';
            div.appendChild(span);
            document.body.appendChild(div);
            const coords = {
                top: span.offsetTop + parseInt(computed['borderTopWidth']),
                left: span.offsetLeft + parseInt(computed['borderLeftWidth']),
                height: parseInt(computed['lineHeight'] || computed['fontSize'])
            };
            document.body.removeChild(div);
            return coords;
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function updateStats() {
            const val = editor.value;
            charsCount.textContent = val.length;
            wordsCount.textContent = val.trim().split(/\s+/).filter(x => x.length > 0).length;
            localStorage.setItem('telugu_api_data', val);
        }

        document.getElementById('lang-toggle').addEventListener('change', (e) => {
            isTransliterationEnabled = e.target.checked;
            const apiStatus = document.getElementById('api-status');
            const labelEn = document.getElementById('label-en');
            const labelTe = document.getElementById('label-te');
            const stIcon = document.getElementById('st-icon');
            const stText = document.getElementById('st-text');

            if (isTransliterationEnabled) {
                apiStatus.className = 'status st-ready';
                stIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>';
                stText.textContent = 'SMART API READY';
                labelEn.style.color = 'var(--s400)';
                labelTe.style.color = 'var(--b600)';
            } else {
                apiStatus.className = 'status st-en';
                stIcon.innerHTML =
                    '<rect width="20" height="16" x="2" y="4" rx="2" ry="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/>';
                stText.textContent = 'ENGLISH MODE';
                labelEn.style.color = 'var(--b600)';
                labelTe.style.color = 'var(--s400)';
                hideSuggestions();
            }
            editor.focus();
        });

        function getActiveWordContext() {
            const text = editor.value,
                pos = editor.selectionStart,
                delimiters = /[\s\n\.,\?!;:'"()[\]{}]/;
            let start = pos - 1;
            while (start >= 0 && !delimiters.test(text[start])) start--;
            start++;
            let end = pos;
            while (end < text.length && !delimiters.test(text[end])) end++;
            return { start, end, word: text.substring(start, end) };
        }

        function handleCursorMove() {
            if (!isTransliterationEnabled) return;
            const ctx = getActiveWordContext();
            if (ctx.word && /^[a-zA-Z]+$/.test(ctx.word)) {
                if (!currentWordContext || currentWordContext.word !== ctx.word || currentWordContext.start !== ctx.start) {
                    currentWordContext = ctx;
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => fetchSuggestions(ctx.word, ctx), 40);
                }
            } else {
                hideSuggestions();
                currentWordContext = null;
            }
        }

        async function fetchSuggestions(word, contextAtRequest) {
            try {
                const res = await fetch(
                    `https://inputtools.google.com/request?text=${encodeURIComponent(word)}&itc=te-t-i0-und&num=6&cp=0&cs=1&ie=utf-8&oe=utf-8&app=demopage`
                    );
                const data = await res.json();
                if (currentWordContext && currentWordContext.start !== contextAtRequest.start) return;
                if (data[0] === 'SUCCESS' && data[1] && data[1][0] && data[1][0][1]) {
                    currentSuggestions = data[1][0][1];
                    activeSuggestionIndex = 0;
                    renderSuggestions(currentSuggestions);
                } else hideSuggestions();
            } catch (e) { hideSuggestions(); }
        }

        function renderSuggestions(suggestions) {
            if (!suggestions || !suggestions.length) return hideSuggestions();
            suggestionBar.innerHTML = '';
            suggestions.forEach((sug, i) => {
                const btn = document.createElement('button');
                btn.className = 'sugg-btn';
                btn.innerHTML = `<span>${sug}</span><span class="num">${i + 1}</span>`;
                btn.onmousedown = (e) => { e.preventDefault();
                    replaceWord(sug, ' '); };
                suggestionBar.appendChild(btn);
            });
            updateSuggestionHighlight();

            if (currentWordContext) {
                const coords = getCaretCoordinates(editor, currentWordContext.end);
                let left = coords.left,
                    top = coords.top + coords.height + 5;
                if (left > editor.clientWidth - 200) left = editor.clientWidth - 200;
                suggestionBar.style.left = `${left}px`;
                suggestionBar.style.top = `${top}px`;
            }
            suggestionBar.style.display = 'flex';
        }

        function updateSuggestionHighlight() {
            const btns = suggestionBar.querySelectorAll('.sugg-btn');
            btns.forEach((btn, i) => {
                if (i === activeSuggestionIndex) {
                    btn.classList.add('active');
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function hideSuggestions() {
            suggestionBar.style.display = 'none';
            currentSuggestions = [];
            activeSuggestionIndex = 0;
        }

        function replaceWord(newWord, trailingChar = '') {
            if (!currentWordContext) return;
            const t = editor.value,
                s = currentWordContext.start,
                e = currentWordContext.end;
            const replacement = newWord + trailingChar;
            editor.value = t.substring(0, s) + replacement + t.substring(e);
            editor.selectionStart = editor.selectionEnd = s + replacement.length;
            hideSuggestions();
            currentWordContext = null;
            updateStats();
        }

        editor.addEventListener('input', () => { handleCursorMove();
            updateStats(); });
        editor.addEventListener('click', handleCursorMove);
        editor.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key) && !currentSuggestions.length)
                handleCursorMove();
        });

        editor.addEventListener('keydown', (e) => {
            if (!isTransliterationEnabled || !currentSuggestions.length || !currentWordContext) return;
            if (['ArrowRight', 'ArrowDown'].includes(e.key)) {
                e.preventDefault();
                activeSuggestionIndex = (activeSuggestionIndex + 1) % currentSuggestions.length;
                updateSuggestionHighlight();
                return;
            }
            if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
                e.preventDefault();
                activeSuggestionIndex = (activeSuggestionIndex - 1 + currentSuggestions.length) % currentSuggestions
                .length;
                updateSuggestionHighlight();
                return;
            }
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                replaceWord(currentSuggestions[activeSuggestionIndex], ' ');
                return;
            }
            const num = parseInt(e.key);
            if (num >= 1 && num <= currentSuggestions.length) {
                e.preventDefault();
                replaceWord(currentSuggestions[num - 1], ' ');
                return;
            }
        });

        window.onload = () => {
            const old = localStorage.getItem('telugu_api_data');
            if (old) { editor.value = old;
                updateStats(); }
        };

        document.getElementById('copy-btn').onclick = () => {
            if (!editor.value.trim()) return;
            editor.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            showToast("క్లిప్బోర్డ్ కి కాపీ చేయబడింది! ✨");
        };

        document.getElementById('download-btn').onclick = () => {
            if (!editor.value.trim()) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([editor.value], { type: 'text/plain' }));
            a.download = `TeluguText_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast("ఫైల్ సేవ్ చేయబడింది! 📁");
        };

        const confirmModal = document.getElementById('confirm-modal');
        document.getElementById('clear-btn').onclick = () => { if (editor.value.trim()) confirmModal.classList.add('open'); };
        document.getElementById('modal-cancel').onclick = () => confirmModal.classList.remove('open');
        document.getElementById('modal-confirm').onclick = () => {
            editor.value = '';
            updateStats();
            confirmModal.classList.remove('open');
            showToast("వర్క్స్పేస్ ఖాళీ చేయబడింది 🧹");
            editor.focus();
        };
    </script>
</body>
</html>
